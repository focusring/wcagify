packages:
  - packages/*
  - playground
  - docs

catalog:
  '@types/better-sqlite3': ^7.6.13
  nanoid: ^5.1.6

catalogMode: prefer

catalogs:
  cli:
    '@clack/prompts': ^1.1.0
    commander: ^14.0.3
    ejs: ^5.0.1
    picocolors: ^1.1.1
  core:
    '@iconify-json/lucide': ^1.2.96
    '@iconify-json/simple-icons': ^1.2.73
    '@nuxt/a11y': 1.0.0-alpha.1
    '@nuxt/content': ^3.12.0
    '@nuxt/icon': ^2.2.1
    '@nuxt/kit': ^4.3.1
    '@nuxt/ui': ^4.5.1
    '@nuxtjs/i18n': ^10.2.3
    '@vueuse/core': ^14.2.1
    better-sqlite3: ^12.6.2
    nuxt: ^4.3.1
    nuxt-studio: ^1.4.0
    tailwindcss: ^4.2.1
    zod: ^4.3.6
  dev:
    '@nuxt/schema': ^4.3.1
    '@types/ejs': ^3.1.5
    '@types/node': ^24.12.0
    '@vitest/coverage-v8': ^4.0.18
    bumpp: ^10.4.1
    changelogen: ^0.6.2
    changelogithub: ^14.0.0
    husky: ^9.1.7
    lint-staged: ^16.3.3
    oxfmt: ^0.37.0
    oxlint: ^1.52.0
    playwright: ^1.58.2
    tsdown: ^0.21.1
    typescript: ^5.9.3
    vitest: ^4.0.18
    vue-tsc: ^3.2.5
  docs:
    '@tailwindcss/vite': ^4.2.1
    vitepress: 2.0.0-alpha.16

linkWorkspacePackages: true

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar
  - semver
  - undici-types
