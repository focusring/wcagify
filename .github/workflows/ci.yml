name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --ignore-scripts

      - name: Build packages
        run: pnpm --filter @focusring/wcagify build && pnpm --filter create-wcagify build

      - run: nuxt prepare
        working-directory: playground

      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm typecheck
